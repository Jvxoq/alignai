## Render Blueprint — backend + agent (both free tier).
## Frontend is served separately (Render Static Site or your own CDN).
##
## Deploy steps:
##   1. Push this file to your repo root.
##   2. Render dashboard → New → Blueprint → point at this repo.
##   3. Before clicking Deploy, set these env vars in the dashboard
##      (marked sync:false below — Render will prompt you for them):
##        alignai-backend:
##          POSTGRES_URL  →  paste the Neon DIRECT connection string (the host
##                           WITHOUT "-pooler"). Paste it raw — the backend
##                           normalizes the scheme to postgresql+asyncpg:// and
##                           the SSL param to ssl= in code (app/core/config.py).
##          CORS_ORIGINS  →  replace placeholder with your real frontend URL,
##                           e.g. '["https://alignai-frontend.onrender.com"]'
##        alignai-agent:
##          POSTGRES_URI  →  paste the SAME Neon DIRECT connection string as-is,
##                           keeping "?sslmode=require". Must be the direct
##                           endpoint, not "-pooler" — the LangGraph checkpoint
##                           store uses prepared statements, which Neon's pooler
##                           (transaction mode) breaks.
##          REDIS_URI     →  internal connection string for a Render Key Value
##                           (Redis-compatible) instance — create one manually
##                           first (Render dashboard → New → Key Value), the
##                           official LangGraph server image requires it for
##                           its task queue/pub-sub and won't boot without it.
##                           If this repo's alignai-redis blueprint reference
##                           doesn't resolve (service created outside this
##                           blueprint), paste the internal URL here directly.
##          LANGSMITH_API_KEY → free key from smith.langchain.com. Required —
##                           the self-hosted image does a license check on
##                           boot and will not start without it, even with
##                           tracing (LANGCHAIN_TRACING_V2) turned off.
##          QDRANT_URL, QDRANT_API_KEY, GROQ_API_KEY, GEMINI_API_KEY
##   4. After first deploy, pin SECRET_KEY: copy the generated value from the
##      backend service env vars and paste it back as a fixed value so deploys
##      don't rotate it and log users out.

## Production Postgres runs on Neon (provisioned in the Neon dashboard, not
## here). Both services point at the same Neon database via the env vars below.

services:
  # ── Backend (public Web Service) ─────────────────────────────────────────────
  - type: web
    name: alignai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Neon DIRECT connection string (no "-pooler" in the host). Paste it raw —
      # the backend normalizes the scheme (+asyncpg) and SSL param (ssl=) in code.
      - key: POSTGRES_URL
        sync: false
      - key: LANGGRAPH_SERVER_URL
        fromService:
          name: alignai-agent
          type: web
          property: hostport
      - key: LANGGRAPH_CONNECTION_TIMEOUT
        value: "10"
      - key: LANGGRAPH_READ_TIMEOUT
        value: "60"
      # Keeps the free-tier agent warm by pinging it well within Render's
      # ~15-minute idle-sleep window, so it should rarely be asleep when a
      # real request comes in.
      - key: AGENT_KEEP_ALIVE_ENABLED
        value: "true"
      - key: AGENT_KEEP_ALIVE_INTERVAL_SECONDS
        value: "600"
      - key: AGENT_KEEP_ALIVE_TIMEOUT_SECONDS
        value: "30"
      - key: SECRET_KEY
        generateValue: true
      # Set to your real frontend URL before deploying — browser requests will
      # be blocked by CORS until this matches the actual frontend origin.
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: MAX_MESSAGE_LENGTH
        value: "2000"
      - key: USER_MESSAGE_THRESHOLD
        value: "50"

  # ── Agent (public Web Service — free tier) ───────────────────────────────────
  - type: web
    name: alignai-agent
    runtime: docker
    dockerfilePath: ./agent/Dockerfile
    dockerContext: ./agent
    plan: free
    healthCheckPath: /ok
    envVars:
      # Same Neon DIRECT connection string as the backend, pasted as-is with
      # ?sslmode=require. Use the direct endpoint, NOT "-pooler": the checkpoint
      # store's prepared statements break under Neon's transaction-mode pooler.
      # Note the key is POSTGRES_URI (not POSTGRES_URL) — that's the exact
      # name the official langgraph-api image reads.
      - key: POSTGRES_URI
        sync: false
      # Required by the official langgraph-api image for its task queue and
      # run-stream pub/sub — see the blueprint header above for setup.
      - key: REDIS_URI
        sync: false
      # Required for the self-hosted license check on boot — see header above.
      - key: LANGSMITH_API_KEY
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: alignai_docs
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: SIMILARITY_THRESHOLD
        value: "0.75"
      - key: RETRIEVAL_TOP_K
        value: "3"
