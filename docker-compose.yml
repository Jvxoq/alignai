# ─────────────────────────────────────────────────────────────────────────────
# BASE / PRODUCTION-PARITY stack — Render does not use this file.
#
# This file alone builds the *production* images (lean, no dev tooling) exactly
# as they'll run in the cloud. docker-compose.override.yml layers DEVELOPMENT on
# top of it (hot-reload, bind-mounted source, dev deps) and is auto-loaded by a
# bare `docker compose up`.
#
#   Development (default):   docker compose up --build          (or: make dev)
#   Production parity:       docker compose -f docker-compose.yml up --build
#                                                               (or: make prod)
#
# Setup:
#   cp .env.example .env      # fill GROQ_API_KEY / GEMINI_API_KEY / QDRANT_* /
#                             # LANGSMITH_API_KEY (LANGSMITH required for the
#                             # PROD agent — the platform server's license check)
# Access (prod parity):
#   - Frontend:     http://localhost
#   - Backend API:  http://localhost:8000/docs
#   - Agent health: http://localhost:8123/ok
# ─────────────────────────────────────────────────────────────────────────────

services:
  # PostgreSQL — backend sessions AND the prod agent's LangGraph checkpoint store.
  postgres:
    image: postgres:16-alpine
    container_name: alignai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alignai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alignai

  # Redis — required by the LangGraph platform server (prod agent) for its task
  # queue / pub-sub. The dev agent (`langgraph dev`) is in-memory and ignores it.
  redis:
    image: redis:7-alpine
    container_name: alignai-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - alignai

  # NOTE: Qdrant runs on Qdrant Cloud (not in Compose). The agent connects to it
  # via QDRANT_URL / QDRANT_API_KEY pulled from the root .env file.

  # FastAPI backend service (production image — see backend/Dockerfile).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alignai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      POSTGRES_URL: postgresql+asyncpg://postgres:password@postgres:5432/alignai
      # LangGraph connection
      LANGGRAPH_SERVER_URL: http://agent:8123
      LANGGRAPH_CONNECTION_TIMEOUT: 10
      LANGGRAPH_READ_TIMEOUT: 60
      AGENT_KEEP_ALIVE_ENABLED: "false"
      # Auth (local prod-parity only — Render generates a real SECRET_KEY)
      SECRET_KEY: dev-secret-key-change-in-production-minimum-32-characters-long
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # App settings — production-honest defaults (the dev overlay flips these)
      ENVIRONMENT: production
      DEBUG: "false"
      CORS_ORIGINS: '["http://localhost"]'
      MAX_MESSAGE_LENGTH: 2000
      USER_MESSAGE_THRESHOLD: 50
      # LLM API Keys
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Observability (optional)
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT_NAME: alignai-local
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alignai

  # LangGraph agent — PRODUCTION platform server (see agent/Dockerfile).
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: alignai-agent
    restart: unless-stopped
    ports:
      - "8123:8123"
    environment:
      # --- LangGraph platform server persistence (server-managed) ---
      # The platform server owns checkpointing and expects these exact names:
      #   REDIS_URI    -> task queue / pub-sub
      #   DATABASE_URI -> Postgres-backed thread + checkpoint store (NOT in-memory)
      # The platform image defaults to port 8000; pin it to 8123 to match the
      # port mapping and the backend's LANGGRAPH_SERVER_URL.
      PORT: 8123
      REDIS_URI: redis://redis:6379
      DATABASE_URI: postgresql://postgres:password@postgres:5432/alignai
      # Qdrant connection (Qdrant Cloud — set both in root .env)
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: alignai_docs
      # LLM API Keys (required for the agent to work)
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Retrieval settings
      SIMILARITY_THRESHOLD: 0.75
      RETRIEVAL_TOP_K: 3
      # Observability — the platform server ALSO uses this for its license check
      # and will not start without a valid key. Softened to `:-` (not `:?`) so the
      # dev overlay, which runs the in-memory dev server, isn't blocked at load.
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT_NAME: alignai-agent-local
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # The platform image is minimal (no uv venv); use its bundled python.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8123/ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - alignai

  # React frontend — PRODUCTION image (Nginx serves a static build).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: alignai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - alignai

volumes:
  postgres_data:
    driver: local

networks:
  alignai:
    driver: bridge
