# Alembic configuration for the AlignAI backend.
#
# NOTE: the database URL is intentionally left blank here — migrations/env.py
# loads it at runtime from app settings (POSTGRES_URL) via get_url(), so this
# file only needs the script location and logging config.

[alembic]
# Path to migration scripts (relative to this file / the run directory).
script_location = migrations

# Prepend the current dir to sys.path so env.py can `import app.*`.
prepend_sys_path = .

# Migration file names are prefixed with a timestamp so versions/ sorts
# chronologically and is self-documenting (e.g. 2026_06_13_2301-<rev>_<slug>.py).
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Overridden by env.py (get_url). Left blank on purpose.
sqlalchemy.url =


# Logging configuration — read by env.py's fileConfig(config.config_file_name).
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
