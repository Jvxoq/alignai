version: 2
updates:
  # Python — backend service (uv)
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns: ["*"]

  # Python — agent service (uv)
  - package-ecosystem: "uv"
    directory: "/agent"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      agent-deps:
        patterns: ["*"]

  # JavaScript — frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns: ["*"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
