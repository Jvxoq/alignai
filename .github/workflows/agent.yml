name: Agent CI

on:
  push:
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"
  pull_request:
    paths:
      - "agent/**"
      - ".github/workflows/agent.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest
